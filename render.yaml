services:
  - type: web
    name: agency-analytics
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "1"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: NODE_VERSION
        value: "22.16.0"
      - key: DATABASE_PATH
        value: /data/database/webapp.db
      - key: FLASK_DEBUG
        value: "false"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: refresh-dashboards
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 6 * * *"
    startCommand: python -c "import requests,os;requests.post(os.environ['RENDER_EXTERNAL_URL']+'/jobs/cron/refresh-dashboards',headers={'Authorization':'Bearer '+os.environ['SECRET_KEY']},timeout=300)"
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: agency-analytics
          envVarKey: SECRET_KEY
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: agency-analytics
          property: host
          prefix: https://

  - type: cron
    name: warren-nurture
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 */2 * * *"
    startCommand: python -c "import requests,os;requests.post(os.environ['RENDER_EXTERNAL_URL']+'/jobs/cron/warren-nurture',headers={'Authorization':'Bearer '+os.environ['SECRET_KEY']},timeout=300)"
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: agency-analytics
          envVarKey: SECRET_KEY
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: agency-analytics
          property: host
          prefix: https://

  - type: cron
    name: warren-appointment-reminders
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "*/5 * * * *"
    startCommand: python -c "import requests,os;requests.post(os.environ['RENDER_EXTERNAL_URL']+'/jobs/cron/warren-appointment-reminders',headers={'Authorization':'Bearer '+os.environ['SECRET_KEY']},timeout=300)"
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: agency-analytics
          envVarKey: SECRET_KEY
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: agency-analytics
          property: host
          prefix: https://
