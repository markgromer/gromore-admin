<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Affiliate Portal{% endblock %} - WARREN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background:#f6f7fb; color:#172033; }
        .partner-shell { min-height:100vh; display:grid; grid-template-columns:240px 1fr; }
        .partner-nav { background:#101828; color:#d0d5dd; padding:22px 18px; }
        .partner-nav .brand { color:#fff; font-weight:700; font-size:1.05rem; margin-bottom:24px; }
        .partner-nav a { color:#aeb6c7; display:block; padding:9px 10px; border-radius:8px; text-decoration:none; margin-bottom:4px; }
        .partner-nav a:hover, .partner-nav a.active { background:#1d2939; color:#fff; }
        .partner-main { padding:28px; }
        .metric-card { background:#fff; border:1px solid #e4e7ec; border-radius:8px; padding:18px; }
        .metric-value { font-size:1.7rem; font-weight:750; }
        .work-card { background:#fff; border:1px solid #e4e7ec; border-radius:8px; }
        .muted-small { color:#667085; font-size:.84rem; }
        @media(max-width: 800px){ .partner-shell{display:block;} .partner-nav{position:relative;} .partner-main{padding:18px;} }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div class="partner-shell">
    <aside class="partner-nav">
        <div class="brand"><i class="bi bi-diagram-3 me-1"></i> WARREN Partners</div>
        <a class="{{ 'active' if request.endpoint == 'partner_dashboard' }}" href="{{ url_for('partner_dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a class="{{ 'active' if request.endpoint == 'partner_demo_new' }}" href="{{ url_for('partner_demo_new') }}"><i class="bi bi-play-circle me-2"></i>Start Demo</a>
        <a href="{{ url_for('partner_logout') }}"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
    </aside>
    <main class="partner-main">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
