<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Login - WARREN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#101828; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:#fff; width:100%; max-width:420px; border-radius:12px; padding:32px; box-shadow:0 18px 60px rgba(0,0,0,.22); }
        .login-card h1 { font-size:1.45rem; font-weight:750; }
    </style>
</head>
<body>
<div class="login-card">
    <h1 class="mb-1">WARREN Partner Portal</h1>
    <p class="text-muted mb-4">Run business demos, track follow-up, and monitor commissions.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="form-label">Email</label>
        <input class="form-control mb-3" type="email" name="email" required autofocus>
        <label class="form-label">Password</label>
        <input class="form-control mb-4" type="password" name="password" required>
        <button class="btn btn-primary w-100">Sign in</button>
    </form>
</div>
</body>
</html>
