<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 0% 0%, #312e81 0%, #1e1b4b 40%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }
        .reset-shell {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,.95);
            border: 1px solid rgba(226,232,240,.6);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 65px rgba(0,0,0,.35);
            padding: 2.5rem 2rem;
        }
        .reset-shell h2 { font-weight: 700; color: #0f172a; margin-bottom: .4rem; }
        .reset-shell .subtitle { color: #64748b; font-size: .92rem; margin-bottom: 1.5rem; }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            border-color: #4338ca;
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338ca, #3730a3);
            border-color: #3730a3;
        }
        .form-control {
            border-radius: 10px;
            border-color: #dbe3ef;
            min-height: 42px;
        }
        .form-control:focus {
            border-color: #a5b4fc;
            box-shadow: 0 0 0 .2rem rgba(79,70,229,.14);
        }
        .pw-requirements {
            font-size: .8rem;
            color: #94a3b8;
            margin-top: .25rem;
        }
    </style>
</head>
<body>
    <div class="reset-shell">
        <h2><i class="bi bi-shield-lock"></i> New Password</h2>
        <p class="subtitle">Choose a new password for your account.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" required autofocus minlength="8">
                <div class="pw-requirements">At least 8 characters</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-check-lg"></i> Update Password
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('client.client_login') }}" style="color:#6366f1;font-size:.88rem;text-decoration:none;">
                <i class="bi bi-arrow-left"></i> Back to Sign In
            </a>
        </div>
    </div>
</body>
</html>
