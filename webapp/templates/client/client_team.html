{% extends "client/client_base.html" %}
{% block title %}Your Team{% endblock %}

{% block content %}
<style>
    .team-hero {
        background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #2563eb 100%);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 28px;
        color: #fff;
        position: relative;
        overflow: hidden;
    }
    .team-hero::after {
        content: '';
        position: absolute;
        top: -40%;
        right: -10%;
        width: 300px;
        height: 300px;
        background: rgba(255,255,255,0.06);
        border-radius: 50%;
    }
    .team-hero h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
    }
    .team-hero p {
        font-size: 0.95rem;
        opacity: 0.85;
        margin: 0;
    }
    .team-stats {
        display: flex;
        gap: 24px;
        margin-top: 18px;
    }
    .team-stat {
        text-align: center;
    }
    .team-stat .stat-val {
        font-size: 1.6rem;
        font-weight: 700;
    }
    .team-stat .stat-lbl {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        opacity: 0.7;
    }

    .agent-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
    }
    .agent-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 24px;
        transition: box-shadow 0.2s, border-color 0.2s;
        position: relative;
    }
    .agent-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border-color: #c7d2fe;
    }
    .agent-card.working {
        border-color: #7c3aed;
        box-shadow: 0 0 0 1px #7c3aed20, 0 4px 16px rgba(124,58,237,0.12);
    }

    .agent-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
    }
    .agent-avatar {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: #fff;
        flex-shrink: 0;
        position: relative;
    }
    .agent-avatar .pulse-ring {
        position: absolute;
        inset: -4px;
        border-radius: 18px;
        border: 2px solid currentColor;
        opacity: 0;
        animation: none;
    }
    .agent-card.working .agent-avatar .pulse-ring {
        animation: agentPulse 2s ease-in-out infinite;
        opacity: 1;
    }
    @keyframes agentPulse {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 0; }
        100% { transform: scale(1); opacity: 0; }
    }

    .agent-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1f2937;
        margin: 0;
    }
    .agent-role {
        font-size: 0.8rem;
        color: #6b7280;
        margin: 0;
    }

    .agent-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
    .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
    }
    .status-working .status-dot { background: #7c3aed; }
    .status-working { background: #ede9fe; color: #7c3aed; }
    .status-idle .status-dot { background: #10b981; }
    .status-idle { background: #d1fae5; color: #059669; }
    .status-standby .status-dot { background: #f59e0b; }
    .status-standby { background: #fef3c7; color: #d97706; }

    .agent-desc {
        font-size: 0.88rem;
        color: #4b5563;
        line-height: 1.5;
        margin-bottom: 14px;
    }

    .agent-current {
        background: #f9fafb;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 14px;
        min-height: 52px;
    }
    .agent-current-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #9ca3af;
        margin-bottom: 4px;
        font-weight: 600;
    }
    .agent-current-text {
        font-size: 0.85rem;
        color: #374151;
    }
    .agent-current-text.typing::after {
        content: '';
        display: inline-block;
        width: 3px;
        height: 14px;
        background: #7c3aed;
        margin-left: 4px;
        animation: blink 1s step-end infinite;
        vertical-align: middle;
    }
    @keyframes blink {
        50% { opacity: 0; }
    }

    .agent-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .agent-skill {
        font-size: 0.72rem;
        background: #f3f4f6;
        color: #6b7280;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 500;
    }

    /* Activity feed */
    .activity-section {
        margin-top: 8px;
    }
    .activity-section h4 {
        font-size: 1rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 16px;
    }
    .activity-feed {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        overflow: hidden;
    }
    .activity-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid #f3f4f6;
        transition: background 0.15s;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-item:hover { background: #fafbfc; }
    .activity-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        color: #fff;
        flex-shrink: 0;
        margin-top: 2px;
    }
    .activity-body {
        flex: 1;
        min-width: 0;
    }
    .activity-agent {
        font-weight: 600;
        color: #374151;
        font-size: 0.85rem;
    }
    .activity-action {
        color: #6b7280;
        font-size: 0.85rem;
    }
    .activity-detail {
        font-size: 0.82rem;
        color: #9ca3af;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .activity-time {
        font-size: 0.72rem;
        color: #d1d5db;
        white-space: nowrap;
        margin-top: 3px;
    }
    .empty-feed {
        padding: 40px;
        text-align: center;
        color: #9ca3af;
    }
    .empty-feed i {
        font-size: 2rem;
        display: block;
        margin-bottom: 8px;
    }

    @media (max-width: 768px) {
        .agent-grid { grid-template-columns: 1fr; }
        .team-stats { gap: 16px; }
        .team-stats .stat-val { font-size: 1.2rem; }
    }
</style>

<!-- Hero -->
<div class="team-hero">
    <h2><i class="bi bi-robot me-2"></i>Your AI Team</h2>
    <p>Nine specialists working around the clock on {{ brand_name }}'s marketing.</p>
    <div class="team-stats">
        <div class="team-stat">
            <div class="stat-val" id="stat-active">-</div>
            <div class="stat-lbl">Working Now</div>
        </div>
        <div class="team-stat">
            <div class="stat-val" id="stat-tasks">-</div>
            <div class="stat-lbl">Tasks Today</div>
        </div>
        <div class="team-stat">
            <div class="stat-val" id="stat-total">-</div>
            <div class="stat-lbl">Total Actions</div>
        </div>
    </div>
</div>

<!-- Agent Grid -->
<div class="agent-grid" id="agent-grid">
    <!-- Filled by JS -->
</div>

<!-- Activity Feed -->
<div class="activity-section">
    <h4><i class="bi bi-activity me-2"></i>Recent Activity</h4>
    <div class="activity-feed" id="activity-feed">
        <div class="empty-feed"><i class="bi bi-clock-history"></i>Loading activity...</div>
    </div>
</div>

<script>
const AGENTS = {{ agents_json | safe }};

const AGENT_COLORS = {
    warren:  '#7c3aed',
    scout:   '#2563eb',
    penny:   '#059669',
    ace:     '#e11d48',
    radar:   '#f59e0b',
    hawk:    '#6366f1',
    pulse:   '#0891b2',
    spark:   '#d946ef',
    bridge:  '#ea580c'
};

const AGENT_ICONS = {
    warren:  'bi-stars',
    scout:   'bi-graph-up-arrow',
    penny:   'bi-piggy-bank',
    ace:     'bi-pencil-square',
    radar:   'bi-shield-check',
    hawk:    'bi-binoculars',
    pulse:   'bi-bar-chart-line',
    spark:   'bi-lightbulb',
    bridge:  'bi-diagram-3'
};

function renderAgentCard(agent) {
    const color = AGENT_COLORS[agent.key] || '#6b7280';
    const icon  = AGENT_ICONS[agent.key]  || 'bi-robot';
    const latest = agent.latest;
    const isWorking = latest && latest.status === 'in_progress';
    const statusClass = isWorking ? 'working' : (latest ? 'idle' : 'standby');
    const statusLabel = isWorking ? 'Working' : (latest ? 'Idle' : 'Standby');
    const currentText = isWorking
        ? latest.action
        : (latest ? `Last: ${latest.action}` : 'Awaiting first task');

    return `
    <div class="agent-card ${isWorking ? 'working' : ''}" data-agent="${agent.key}">
        <div class="agent-header">
            <div class="agent-avatar" style="background:${color}">
                <div class="pulse-ring" style="color:${color}"></div>
                <i class="bi ${icon}"></i>
            </div>
            <div>
                <p class="agent-name">${agent.name}</p>
                <p class="agent-role">${agent.role}</p>
            </div>
            <div class="ms-auto">
                <span class="agent-status status-${statusClass}">
                    <span class="status-dot"></span>
                    ${statusLabel}
                </span>
            </div>
        </div>
        <div class="agent-desc">${agent.description}</div>
        <div class="agent-current">
            <div class="agent-current-label">${isWorking ? 'Currently doing' : 'Status'}</div>
            <div class="agent-current-text ${isWorking ? 'typing' : ''}">${currentText}</div>
        </div>
        <div class="agent-skills">
            ${agent.skills.map(s => `<span class="agent-skill">${s}</span>`).join('')}
        </div>
    </div>`;
}

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const now = new Date();
    const then = new Date(dateStr + 'Z');
    const diff = Math.floor((now - then) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function renderActivity(items) {
    if (!items || items.length === 0) {
        return '<div class="empty-feed"><i class="bi bi-check-circle"></i>No activity yet. Your team will start logging work as they take action on your account.</div>';
    }
    return items.map(item => {
        const agent = AGENTS.find(a => a.key === item.agent_key) || {};
        const color = AGENT_COLORS[item.agent_key] || '#6b7280';
        const icon  = AGENT_ICONS[item.agent_key]  || 'bi-robot';
        return `
        <div class="activity-item">
            <div class="activity-icon" style="background:${color}">
                <i class="bi ${icon}"></i>
            </div>
            <div class="activity-body">
                <span class="activity-agent">${agent.name || item.agent_key}</span>
                <span class="activity-action">${item.action}</span>
                ${item.detail ? `<div class="activity-detail" title="${item.detail}">${item.detail}</div>` : ''}
            </div>
            <div class="activity-time">${timeAgo(item.created_at)}</div>
        </div>`;
    }).join('');
}

function loadTeamData() {
    fetch('{{ url_for("client.client_team_data") }}')
        .then(r => r.json())
        .then(data => {
            // Merge latest activity into agent definitions
            const agents = data.agents || AGENTS;
            agents.forEach(a => {
                if (data.latest && data.latest[a.key]) {
                    a.latest = data.latest[a.key];
                }
            });

            // Render cards
            document.getElementById('agent-grid').innerHTML =
                agents.map(a => renderAgentCard(a)).join('');

            // Stats
            const working = agents.filter(a => a.latest && a.latest.status === 'in_progress').length;
            document.getElementById('stat-active').textContent = working;
            document.getElementById('stat-tasks').textContent = data.today_count || 0;
            document.getElementById('stat-total').textContent = data.total_count || 0;

            // Activity feed
            document.getElementById('activity-feed').innerHTML =
                renderActivity(data.activity || []);
        })
        .catch(err => {
            console.error('Team data error:', err);
            // Still render cards from static data
            document.getElementById('agent-grid').innerHTML =
                AGENTS.map(a => renderAgentCard(a)).join('');
            document.getElementById('stat-active').textContent = '0';
            document.getElementById('stat-tasks').textContent = '0';
            document.getElementById('stat-total').textContent = '0';
            document.getElementById('activity-feed').innerHTML =
                '<div class="empty-feed"><i class="bi bi-check-circle"></i>No activity yet. Your team will start logging work as they take action on your account.</div>';
        });
}

// Load on page ready, then poll every 30s
loadTeamData();
setInterval(loadTeamData, 30000);
</script>
{% endblock %}
