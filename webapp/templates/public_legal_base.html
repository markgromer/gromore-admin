<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GroMore Legal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f6fa;
            color: #1f2937;
            font-family: Georgia, "Times New Roman", serif;
        }
        .legal-wrap {
            max-width: 880px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .legal-hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            padding: 32px 36px;
        }
        .legal-body {
            padding: 32px 36px 40px;
            line-height: 1.65;
        }
        h1, h2, h3 {
            font-family: "Segoe UI", sans-serif;
        }
        h2 {
            margin-top: 28px;
            font-size: 1.2rem;
        }
        .meta-note {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 14px 16px;
            margin: 18px 0;
            font-family: "Segoe UI", sans-serif;
        }
        .footer-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 24px;
            font-family: "Segoe UI", sans-serif;
        }
    </style>
</head>
<body>
    <div class="legal-wrap">
        <div class="legal-hero">
            <div class="small text-uppercase opacity-75 mb-2">GroMore Media</div>
            <h1 class="h3 mb-1">{% block hero_title %}Legal Information{% endblock %}</h1>
            <div class="opacity-75">{% block hero_subtitle %}Public compliance information for platform integrations and user rights.{% endblock %}</div>
        </div>
        <div class="legal-body">
            {% block content %}{% endblock %}
            <div class="footer-links">
                <a href="{{ url_for('privacy_policy') }}">Privacy Policy</a>
                <a href="{{ url_for('terms_of_service') }}">Terms of Service</a>
                <a href="{{ url_for('meta_data_deletion') }}">Meta Data Deletion</a>
            </div>
        </div>
    </div>
</body>
</html>
